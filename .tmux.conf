set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# ==================== Basic Settings ====================

# Use tmux-256color as the base (best compatibility)
set -g default-terminal "tmux-256color"

# Enable true color (24-bit RGB) support
set -as terminal-overrides ',*:RGB'

# Enable undercurl (curly underline) + colored underlines
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Ghostty-specific features
set -ga terminal-features "xterm-ghostty:clipboard:ccolour:cstyle:focus:title:extkeys:RGB:usstyle"

# Enable extended keys (helps with Shift+Enter, Ctrl+Enter, etc.)
set -s extended-keys-format csi-u

# Mouse support (Ghostty handles this very well)
set -g mouse on

# Faster key repetition
set -sg escape-time 10
set -g repeat-time 300

# Increase history limit
set -g history-limit 50000

# Focus events (useful for vim/neovim)
set -g focus-events on

set -g base-index 1
set -g pane-base-index 1

# ==================== Status Bar & Appearance ====================

# Refresh status more often
set -g status-interval 5

# Nice status bar (feel free to customize or use a plugin like powerline/tmux-power)
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=blue,bold]#S "
set -g status-right "#[fg=yellow]%H:%M  #[fg=cyan]#H"
set -g window-status-current-style "bold,fg=green"

# ==================== Key Bindings ====================

unbind C-b
set -g prefix C-_
bind C-_ send-prefix

# Split panes with | and -
bind d split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Kill pane with Prefix + k (with confirmation for safety)
unbind x
bind k confirm-before -p "Kill pane #{pane_index}? (y/n)" kill-pane

# Copy mode improvements
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Optional: Smart pane switching with awareness of Vim splits
# (requires vim-tmux-navigator plugin or similar)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ==================== Full-Side Active Pane Border (tmux 3.6a) ====================

# Use double lines for thicker, more visible borders
# set -g pane-border-lines double

# Strong color for the active pane border (bright and high contrast)
set -g pane-active-border-style "fg=colour208,bg=default"   # vivid orange – stands out well
# Good alternatives:
# set -g pane-active-border-style "fg=brightred,bg=default"
# set -g pane-active-border-style "fg=#ff79c6,bg=default"     # hot pink

# Subtle inactive borders
set -g pane-border-style "fg=colour237,bg=default"

# Show arrows on the borders to clearly mark the active pane
set -g pane-border-indicators arrows

# This is the key trick for "border on all sides":
# It adds an extra line at the top of every pane (including active)
# making the active pane look fully enclosed on top + sides + bottom
set -g pane-border-status top
set -g pane-border-format ""        # keep it empty so it only adds visual space/line

# Dim inactive panes (foreground dimming avoids compositing artifacts)
set -g window-style 'fg=colour245,bg=default'
set -g window-active-style 'fg=default,bg=default'
